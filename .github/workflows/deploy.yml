name: Deploy
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm wrangler d1 migrations apply maxhp-community
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - run: pnpm build
        env:
          FATSECRET_API_KEY: ${{ secrets.FATSECRET_API_KEY }}
          FATSECRET_API_SECRET: ${{ secrets.FATSECRET_API_SECRET }}
          NUXT_MODERATOR_SECRET: ${{ secrets.NUXT_MODERATOR_SECRET }}
